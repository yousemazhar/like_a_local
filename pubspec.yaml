name: like_a_local
description: "Discover cities like a local — hidden gems, restaurants and experiences."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + codegen
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.3.0
  firebase_remote_config: ^5.1.0
  cloud_functions: ^5.1.0

  # Navigation
  go_router: ^14.6.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Maps + location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  geoflutterfire_plus: ^0.0.27

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  chewie: ^1.8.5
  flutter_image_compress: ^2.3.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Payments
  purchases_flutter: ^8.0.0
  flutter_stripe: ^11.1.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1

  # Localization
  intl: ^0.20.0

  # Offline + cache
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0
  connectivity_plus: ^6.0.5
  flutter_secure_storage: ^9.2.2

  # Utils
  logger: ^2.4.0
  uuid: ^4.4.2
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#B96446"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
